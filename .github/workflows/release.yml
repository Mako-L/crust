name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset: crust-linux-amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            asset: crust-linux-arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
            asset: crust-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset: crust-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            asset: crust-windows-amd64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: >
          go build
          -ldflags "
            -s -w
            -X main.Version=${{ github.ref_name }}
            -X main.Commit=${{ github.sha }}
            -X main.BuildDate=${{ github.event.head_commit.timestamp }}
          "
          -o ${{ matrix.asset }}
          .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  ios:
    name: Build iOS xcframework
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build Libcrust.xcframework
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA:0:7}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gomobile bind \
            -target ios \
            -tags libcrust \
            -ldflags "-X github.com/BakeLens/crust/pkg/libcrust.Version=${VERSION} -X github.com/BakeLens/crust/pkg/libcrust.Commit=${COMMIT} -X github.com/BakeLens/crust/pkg/libcrust.BuildDate=${BUILD_DATE}" \
            -o build/ios/Libcrust.xcframework \
            ./pkg/libcrust/

      - name: Zip xcframework
        run: |
          cd build/ios
          zip -r Libcrust.xcframework.zip Libcrust.xcframework

      - name: Compute checksum
        run: |
          shasum -a 256 build/ios/Libcrust.xcframework.zip | awk '{print $1}' > build/ios/Libcrust.xcframework.zip.sha256
          echo "XCFRAMEWORK_CHECKSUM=$(cat build/ios/Libcrust.xcframework.zip.sha256)" >> "$GITHUB_ENV"
          echo "xcframework checksum: $(cat build/ios/Libcrust.xcframework.zip.sha256)"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Libcrust.xcframework.zip
          path: |
            build/ios/Libcrust.xcframework.zip
            build/ios/Libcrust.xcframework.zip.sha256

  release:
    name: Create Release
    needs: [build, ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./* > sha256sums.txt
          cat sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            dist/sha256sums.txt
          generate_release_notes: false
          draft: true

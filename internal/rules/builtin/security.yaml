rules:
  # ===========================================================================
  # 1. CREDENTIAL PROTECTION
  # ===========================================================================
  - name: protect-env-files
    block: ["**/.env", "**/.env.*"]
    except: ["**/.env.example", "**/.env.template"]
    actions: [read, write, delete, copy, move, network]
    message: "Cannot access .env files - may contain secrets"
    severity: critical

  - name: protect-ssh-keys
    block:
      - "/Users/*/.ssh/id_*"
      - "/home/*/.ssh/id_*"
      - "C:/Users/*/.ssh/id_*"
    except:
      - "/Users/*/.ssh/id_*.pub"
      - "/home/*/.ssh/id_*.pub"
      - "C:/Users/*/.ssh/id_*.pub"
    actions: [read, write, delete, copy, move, network]
    message: "Cannot access SSH private keys"
    severity: critical

  # ===========================================================================
  # 2. SYSTEM AUTHENTICATION FILES
  # ===========================================================================
  - name: protect-system-auth
    block:
      - "/etc/passwd"
      - "/etc/shadow"
      - "/etc/master.passwd"
      - "/etc/sudoers"
      - "/etc/sudoers.d/**"
    actions: [read, write, delete, copy, move, network]
    message: "Cannot access system authentication files"
    severity: critical

  # ===========================================================================
  # 3. SELF PROTECTION
  # ===========================================================================
  - name: protect-crust
    block:
      - "**/.crust/**"
      - "**/crust*.db"
    actions: [read, write, delete]
    message: "Cannot access Crust data"
    severity: critical

  # ===========================================================================
  # 4. SHELL HISTORY PROTECTION
  # ===========================================================================
  - name: protect-shell-history
    block:
      # macOS
      - "/Users/*/.bash_history"
      - "/Users/*/.zsh_history"
      - "/Users/*/.sh_history"
      - "/Users/*/.history"
      - "/Users/*/.python_history"
      - "/Users/*/.node_repl_history"
      - "/Users/*/.mysql_history"
      - "/Users/*/.psql_history"
      - "/Users/*/.sqlite_history"
      - "/Users/*/.lesshst"
      # Linux
      - "/home/*/.bash_history"
      - "/home/*/.zsh_history"
      - "/home/*/.sh_history"
      - "/home/*/.history"
      - "/home/*/.python_history"
      - "/home/*/.node_repl_history"
      - "/home/*/.mysql_history"
      - "/home/*/.psql_history"
      - "/home/*/.sqlite_history"
      - "/home/*/.lesshst"
      # Linux root
      - "/root/.bash_history"
      - "/root/.zsh_history"
      - "/root/.sh_history"
      - "/root/.history"
      # Windows (Git Bash / WSL)
      - "C:/Users/*/.bash_history"
      - "C:/Users/*/.zsh_history"
    actions: [read, write, delete, copy, move, network]
    message: "Cannot access shell history files"
    severity: high

  # ===========================================================================
  # 5. CLOUD CREDENTIALS PROTECTION
  # ===========================================================================
  - name: protect-cloud-credentials
    block:
      # AWS (~/.aws/)
      - "/Users/*/.aws/credentials"
      - "/Users/*/.aws/config"
      - "/home/*/.aws/credentials"
      - "/home/*/.aws/config"
      - "C:/Users/*/.aws/credentials"
      - "C:/Users/*/.aws/config"
      # Google Cloud (~/.config/gcloud/)
      - "/Users/*/.config/gcloud/**"
      - "/home/*/.config/gcloud/**"
      - "C:/Users/*/.config/gcloud/**"
      # Azure (~/.azure/)
      - "/Users/*/.azure/**"
      - "/home/*/.azure/**"
      - "C:/Users/*/.azure/**"
      # Kubernetes (~/.kube/)
      - "/Users/*/.kube/config"
      - "/Users/*/.kube/cache/**"
      - "/home/*/.kube/config"
      - "/home/*/.kube/cache/**"
      - "C:/Users/*/.kube/config"
      - "C:/Users/*/.kube/cache/**"
      # Docker (~/.docker/)
      - "/Users/*/.docker/config.json"
      - "/home/*/.docker/config.json"
      - "C:/Users/*/.docker/config.json"
      # Terraform (~/.terraform.d/ is home-only; .tfstate is project-scoped)
      - "/Users/*/.terraform.d/credentials.tfrc.json"
      - "/home/*/.terraform.d/credentials.tfrc.json"
      - "C:/Users/*/.terraform.d/credentials.tfrc.json"
      - "**/terraform.tfstate"
      - "**/terraform.tfstate.backup"
    actions: [read, write, delete, copy, move, network]
    message: "Cannot access cloud credentials"
    severity: critical

  # ===========================================================================
  # 6. GPG/PGP KEY PROTECTION
  # ===========================================================================
  - name: protect-gpg-keys
    block:
      - "/Users/*/.gnupg/private-keys-v1.d/**"
      - "/Users/*/.gnupg/secring.gpg"
      - "/Users/*/.gnupg/trustdb.gpg"
      - "/Users/*/.gnupg/random_seed"
      - "/home/*/.gnupg/private-keys-v1.d/**"
      - "/home/*/.gnupg/secring.gpg"
      - "/home/*/.gnupg/trustdb.gpg"
      - "/home/*/.gnupg/random_seed"
      - "C:/Users/*/.gnupg/private-keys-v1.d/**"
      - "C:/Users/*/.gnupg/secring.gpg"
      - "C:/Users/*/.gnupg/trustdb.gpg"
      - "C:/Users/*/.gnupg/random_seed"
    except:
      - "/Users/*/.gnupg/pubring.gpg"
      - "/Users/*/.gnupg/*.conf"
      - "/home/*/.gnupg/pubring.gpg"
      - "/home/*/.gnupg/*.conf"
      - "C:/Users/*/.gnupg/pubring.gpg"
      - "C:/Users/*/.gnupg/*.conf"
    actions: [read, write, delete, copy, move, network]
    message: "Cannot access GPG private keys"
    severity: critical

  # ===========================================================================
  # 7. BROWSER DATA PROTECTION
  # ===========================================================================
  - name: protect-browser-data
    block:
      # Chrome (macOS)
      - "/Users/*/Library/Application Support/Google/Chrome/**/Login Data"
      - "/Users/*/Library/Application Support/Google/Chrome/**/Cookies"
      - "/Users/*/Library/Application Support/Google/Chrome/**/History"
      # Chrome (Linux)
      - "/home/*/.config/google-chrome/**/Login Data"
      - "/home/*/.config/google-chrome/**/Cookies"
      - "/home/*/.config/google-chrome/**/History"
      # Chrome (Windows)
      - "C:/Users/*/AppData/Local/Google/Chrome/User Data/**/Login Data"
      - "C:/Users/*/AppData/Local/Google/Chrome/User Data/**/Cookies"
      - "C:/Users/*/AppData/Local/Google/Chrome/User Data/**/History"
      # Firefox (macOS)
      - "/Users/*/Library/Application Support/Firefox/Profiles/**/logins.json"
      - "/Users/*/Library/Application Support/Firefox/Profiles/**/key*.db"
      - "/Users/*/Library/Application Support/Firefox/Profiles/**/cookies.sqlite"
      # Firefox (Linux)
      - "/home/*/.mozilla/firefox/**/logins.json"
      - "/home/*/.mozilla/firefox/**/key*.db"
      - "/home/*/.mozilla/firefox/**/cookies.sqlite"
      # Firefox (Windows)
      - "C:/Users/*/AppData/Roaming/Mozilla/Firefox/Profiles/**/logins.json"
      - "C:/Users/*/AppData/Roaming/Mozilla/Firefox/Profiles/**/key*.db"
      - "C:/Users/*/AppData/Roaming/Mozilla/Firefox/Profiles/**/cookies.sqlite"
      # Safari (macOS only)
      - "/Users/*/Library/Safari/History.db"
      - "/Users/*/Library/Cookies/Cookies.binarycookies"
    actions: [read, copy]
    message: "Cannot access browser sensitive data"
    severity: high

  # ===========================================================================
  # 8. GIT CREDENTIALS PROTECTION
  # ===========================================================================
  - name: protect-git-credentials
    block:
      - "**/.git-credentials"
      - "**/.config/git/credentials"
    actions: [read, write, delete, copy, move, network]
    message: "Cannot access git credentials"
    severity: high

  # ===========================================================================
  # 9. PACKAGE MANAGER TOKENS
  # ===========================================================================
  - name: protect-package-tokens
    block:
      # npm
      - "**/.npmrc"
      # Yarn
      - "**/.yarnrc"
      - "**/.yarnrc.yml"
      # pip/PyPI
      - "**/.pypirc"
      - "**/.pip/pip.conf"
      # Cargo
      - "**/.cargo/credentials"
      - "**/.cargo/credentials.toml"
      # Composer
      - "**/.composer/auth.json"
      # NuGet
      - "**/.nuget/NuGet.Config"
      # Gem
      - "**/.gem/credentials"
    actions: [read, write, delete, copy, move, network]
    message: "Cannot access package manager tokens"
    severity: high

  # ===========================================================================
  # 10. PERSISTENCE PROTECTION - Shell RC Files
  # ===========================================================================
  - name: protect-shell-rc
    block:
      # macOS
      - "/Users/*/.bashrc"
      - "/Users/*/.bash_profile"
      - "/Users/*/.bash_login"
      - "/Users/*/.zshrc"
      - "/Users/*/.zprofile"
      - "/Users/*/.zshenv"
      - "/Users/*/.profile"
      # Linux
      - "/home/*/.bashrc"
      - "/home/*/.bash_profile"
      - "/home/*/.bash_login"
      - "/home/*/.zshrc"
      - "/home/*/.zprofile"
      - "/home/*/.zshenv"
      - "/home/*/.profile"
      - "/root/.bashrc"
      - "/root/.zshrc"
      - "/root/.profile"
      # Windows (Git Bash)
      - "C:/Users/*/.bashrc"
      - "C:/Users/*/.bash_profile"
      - "C:/Users/*/.profile"
    actions: [write, delete]
    message: "Cannot modify shell startup files - persistence vector"
    severity: critical

  # ===========================================================================
  # 11. SSH AUTHORIZED KEYS PROTECTION
  # ===========================================================================
  - name: protect-ssh-authorized-keys
    block:
      - "/Users/*/.ssh/authorized_keys"
      - "/Users/*/.ssh/authorized_keys2"
      - "/home/*/.ssh/authorized_keys"
      - "/home/*/.ssh/authorized_keys2"
      - "/root/.ssh/authorized_keys"
      - "/root/.ssh/authorized_keys2"
      - "C:/Users/*/.ssh/authorized_keys"
      - "C:/Users/*/.ssh/authorized_keys2"
    actions: [write, delete]
    message: "Cannot modify SSH authorized keys - persistence vector"
    severity: critical

  # ===========================================================================
  # 12. DESKTOP APP TOKEN PROTECTION
  # ===========================================================================
  - name: protect-desktop-app-tokens
    block:
      # Electron apps store session tokens in LevelDB/SQLite under app data dirs.
      # No legitimate AI coding agent reads these — MCP integrations use API
      # tokens via env vars, not local session files.
      #
      # macOS: /Users/<user>/Library/Application Support/<App>/
      # Linux: /home/<user>/.config/<App>/  (or .local/share/ for some)
      # Windows: C:/Users/<user>/AppData/Roaming/<App>/  (after ToSlash)
      #
      # --- Chat / Communication (account takeover risk) ---
      # Discord (+ PTB / Canary variants)
      - "/Users/*/Library/Application Support/discord/**"
      - "/Users/*/Library/Application Support/discordptb/**"
      - "/Users/*/Library/Application Support/discordcanary/**"
      - "/home/*/.config/discord/**"
      - "/home/*/.config/discordptb/**"
      - "/home/*/.config/discordcanary/**"
      - "C:/Users/*/AppData/Roaming/discord/**"
      - "C:/Users/*/AppData/Roaming/discordptb/**"
      - "C:/Users/*/AppData/Roaming/discordcanary/**"
      # Slack
      - "/Users/*/Library/Application Support/Slack/**"
      - "/home/*/.config/Slack/**"
      - "C:/Users/*/AppData/Roaming/Slack/**"
      # Telegram Desktop
      - "/Users/*/Library/Application Support/Telegram Desktop/**"
      - "/home/*/.local/share/TelegramDesktop/**"
      - "C:/Users/*/AppData/Roaming/Telegram Desktop/**"
      # Signal
      - "/Users/*/Library/Application Support/Signal/**"
      - "/home/*/.config/Signal/**"
      - "C:/Users/*/AppData/Roaming/Signal/**"
      # WhatsApp Desktop
      - "/Users/*/Library/Application Support/WhatsApp/**"
      - "/home/*/.config/WhatsApp/**"
      - "C:/Users/*/AppData/Roaming/WhatsApp/**"
      # Microsoft Teams
      - "/Users/*/Library/Application Support/Microsoft Teams/**"
      - "/home/*/.config/Microsoft/Microsoft Teams/**"
      - "C:/Users/*/AppData/Roaming/Microsoft/Teams/**"
      # Element (Matrix)
      - "/Users/*/Library/Application Support/Element/**"
      - "/home/*/.config/Element/**"
      - "C:/Users/*/AppData/Roaming/Element/**"
      # Skype
      - "/Users/*/Library/Application Support/Microsoft/Skype for Desktop/**"
      - "/home/*/.config/skypeforlinux/**"
      - "C:/Users/*/AppData/Roaming/Microsoft/Skype for Desktop/**"
      # --- Developer Tools (API keys / OAuth tokens) ---
      # Postman
      - "/Users/*/Library/Application Support/Postman/**"
      - "/home/*/.config/Postman/**"
      - "C:/Users/*/AppData/Roaming/Postman/**"
      # GitHub Desktop
      - "/Users/*/Library/Application Support/GitHub Desktop/**"
      - "/home/*/.config/GitHub Desktop/**"
      - "C:/Users/*/AppData/Roaming/GitHub Desktop/**"
      # Figma
      - "/Users/*/Library/Application Support/Figma/**"
      - "/home/*/.config/Figma/**"
      - "C:/Users/*/AppData/Roaming/Figma/**"
      # Insomnia
      - "/Users/*/Library/Application Support/Insomnia/**"
      - "/home/*/.config/Insomnia/**"
      - "C:/Users/*/AppData/Roaming/Insomnia/**"
      # --- Password Managers (local vault = all passwords) ---
      # Bitwarden
      - "/Users/*/Library/Application Support/Bitwarden/**"
      - "/home/*/.config/Bitwarden/**"
      - "C:/Users/*/AppData/Roaming/Bitwarden/**"
      # --- Productivity ---
      # Notion
      - "/Users/*/Library/Application Support/Notion/**"
      - "/home/*/.config/Notion/**"
      - "C:/Users/*/AppData/Roaming/Notion/**"
    actions: [read, write, delete, copy, move, network]
    message: "Cannot access desktop app data - may contain session tokens"
    severity: critical

  # ===========================================================================
  # 13. PRIVATE KEY CONTENT DETECTION
  # ===========================================================================
  - name: detect-private-key-write
    match:
      content: "re:-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----"
    actions: [write]
    message: "Cannot write private key content - potential key exfiltration"
    severity: critical

  # ===========================================================================
  # 14. SHELL EVASION PATTERNS (defense-in-depth for command regex rules)
  # ===========================================================================
  - name: block-eval-exec
    match:
      command: "re:\\beval\\b|\\bexec\\b"
    actions: [execute]
    message: "eval/exec prevents static security analysis. Use direct commands instead."
    severity: high
